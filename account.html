<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Account | Deepika Enterprise</title>
  <link rel="icon" type="image/avif" href="images/logo.avif" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .account-page { min-height: 100vh; background: #f5f7f5; padding: 100px 16px 60px; }
    .account-container { max-width: 700px; margin: 0 auto; }
    .account-hero { background: linear-gradient(135deg, #1e6340, #3d9a65); border-radius: 16px; padding: 32px; color: #fff; display: flex; align-items: center; gap: 20px; margin-bottom: 24px; }
    .account-avatar { width: 64px; height: 64px; background: rgba(255,255,255,0.25); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; font-weight: 700; flex-shrink: 0; }
    .account-hero h2 { font-family: 'Playfair Display', serif; font-size: 1.5rem; margin: 0 0 4px; }
    .account-hero p { margin: 0; opacity: 0.85; font-size: 0.9rem; }
    .account-card { background: #fff; border-radius: 16px; padding: 28px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); margin-bottom: 20px; }
    .account-card h3 { font-family: 'Playfair Display', serif; color: #1e6340; font-size: 1.1rem; margin: 0 0 20px; padding-bottom: 12px; border-bottom: 2px solid #f0f0f0; }
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .info-item label { display: block; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #888; margin-bottom: 4px; }
    .info-item span { font-size: 0.95rem; color: #222; font-weight: 500; }
    .info-item span.empty { color: #bbb; font-style: italic; font-weight: 400; }
    .badge { display: inline-block; background: #e8f5ee; color: #1e6340; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }
    .logout-btn { width: 100%; padding: 13px; background: #fff; color: #dc2626; border: 2px solid #fecaca; border-radius: 8px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: inherit; }
    .logout-btn:hover { background: #fef2f2; }
    .wa-cta { display: flex; align-items: center; gap: 14px; background: #f0fdf4; border: 1.5px solid #bbf7d0; border-radius: 12px; padding: 18px; text-decoration: none; transition: background 0.2s; }
    .wa-cta:hover { background: #dcfce7; }
    .wa-cta-icon { width: 44px; height: 44px; background: #25d366; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .wa-cta-text strong { display: block; color: #1e6340; font-size: 0.95rem; }
    .wa-cta-text span { color: #555; font-size: 0.83rem; }
    .loading-screen { position: fixed; inset: 0; background: #fff; display: flex; align-items: center; justify-content: center; z-index: 999; flex-direction: column; gap: 12px; }
    .spinner { width: 36px; height: 36px; border: 3px solid #e0e0e0; border-top-color: #1e6340; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (max-width: 500px) { .info-grid { grid-template-columns: 1fr; } .account-hero { flex-direction: column; text-align: center; } }
  </style>
</head>
<body>

  <div class="loading-screen" id="loadingScreen">
    <div class="spinner"></div>
    <p style="color:#888;font-size:0.9rem;">Loading your account...</p>
  </div>

  <header class="navbar" id="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">
        <img src="images/logo.avif" alt="Deepika Enterprise Logo" class="logo-img" />
        <div class="logo-text">
          <span class="logo-main">Deepika Enterprise</span>
          <span class="logo-sub">Since 1993</span>
        </div>
      </a>
      <nav class="nav-links" id="navLinks">
        <a href="index.html">Home</a>
        <a href="index.html#products">Products</a>
        <a href="index.html#contact">Contact</a>
        <a href="login.html" id="nav-auth-link" style="color:var(--green-700);font-weight:600;">My Account</a>
      </nav>
      <button class="hamburger" id="hamburger" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <div class="account-page" id="accountPage" style="display:none;">
    <div class="account-container">

      <div class="account-hero">
        <div class="account-avatar" id="avatarInitial">?</div>
        <div>
          <h2 id="accountName">Loading...</h2>
          <p id="accountEmail">—</p>
        </div>
      </div>

      <div class="account-card">
        <h3>Your Details</h3>
        <div class="info-grid">
          <div class="info-item">
            <label>Phone</label>
            <span id="info-phone">—</span>
          </div>
          <div class="info-item">
            <label>Company</label>
            <span id="info-company">—</span>
          </div>
          <div class="info-item">
            <label>City</label>
            <span id="info-city">—</span>
          </div>
          <div class="info-item">
            <label>Interested In</label>
            <span id="info-interest">—</span>
          </div>
          <div class="info-item">
            <label>Member Since</label>
            <span id="info-joined">—</span>
          </div>
        </div>
      </div>

      <div class="account-card">
        <h3>Quick Enquiry</h3>
        <a href="https://wa.me/919312242208" target="_blank" rel="noopener" class="wa-cta">
          <div class="wa-cta-icon">
            <svg viewBox="0 0 24 24" fill="white" width="22" height="22"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          </div>
          <div class="wa-cta-text">
            <strong>Chat with us on WhatsApp</strong>
            <span>Get prices, place orders or ask questions — +91 93122 42208</span>
          </div>
        </a>
      </div>

      <div class="account-card">
        <button class="logout-btn" onclick="handleLogout()">Sign Out</button>
      </div>

    </div>
  </div>

  <!-- FIREBASE SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // ============================================================
    // PASTE YOUR FIREBASE CONFIG HERE (same as login.html)
    // ============================================================
    const firebaseConfig = {
      apiKey: "PASTE_YOUR_API_KEY",
      authDomain: "PASTE_YOUR_AUTH_DOMAIN",
      projectId: "PASTE_YOUR_PROJECT_ID",
      storageBucket: "PASTE_YOUR_STORAGE_BUCKET",
      messagingSenderId: "PASTE_YOUR_SENDER_ID",
      appId: "PASTE_YOUR_APP_ID"
    };
    // ============================================================

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    onAuthStateChanged(auth, async (user) => {
      document.getElementById('loadingScreen').style.display = 'none';
      if (!user) {
        window.location.href = 'login.html';
        return;
      }
      document.getElementById('accountPage').style.display = 'block';
      document.getElementById('accountEmail').textContent = user.email;

      try {
        const snap = await getDoc(doc(db, 'users', user.uid));
        if (snap.exists()) {
          const d = snap.data();
          const fullName = `${d.firstName || ''} ${d.lastName || ''}`.trim() || 'User';
          document.getElementById('accountName').textContent = fullName;
          document.getElementById('avatarInitial').textContent = (d.firstName || 'U')[0].toUpperCase();
          document.getElementById('info-phone').textContent = d.phone || '—';
          document.getElementById('info-company').innerHTML = d.company ? `<span class="badge">${d.company}</span>` : '<span class="empty">Not provided</span>';
          document.getElementById('info-city').textContent = d.city || '—';
          document.getElementById('info-interest').textContent = d.interest || '—';
          if (d.createdAt) {
            document.getElementById('info-joined').textContent = new Date(d.createdAt.seconds * 1000).toLocaleDateString('en-IN', { day: 'numeric', month: 'long', year: 'numeric' });
          }
        } else {
          document.getElementById('accountName').textContent = user.email.split('@')[0];
          document.getElementById('avatarInitial').textContent = user.email[0].toUpperCase();
        }
      } catch (e) {
        console.error(e);
      }
    });

    window.handleLogout = async function() {
      await signOut(auth);
      window.location.href = 'index.html';
    };
  </script>
  <script src="js/script.js"></script>
</body>
</html>
